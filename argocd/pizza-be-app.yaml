apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pizza-be
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/LamSut/GitOps.git
    targetRevision: main
    path: charts/pizza-be
    helm:
      valueFiles:
        - ../../environments/dev/pizza-be-values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: pizza
  syncPolicy:
    automated:
      prune: true
      selfHeal: true